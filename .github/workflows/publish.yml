name: Publish to crates.io

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run checks and cargo publish --dry-run only"
        type: boolean
        required: true
        default: true
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cargo fmt
        run: cargo fmt --all --check

      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Cargo test
        run: cargo test --workspace --all-features

      - name: Cargo doc
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --workspace --no-deps --all-features

      - name: Publish micronet-antenna-core (dry-run)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: cargo publish -p micronet-antenna-core --dry-run

      - name: Publish micronet-antenna (dry-run)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: cargo publish -p micronet-antenna --dry-run

      - name: Publish micronet-antenna-core
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run) }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p micronet-antenna-core

      - name: Publish micronet-antenna
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run) }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          for i in 1 2 3 4 5; do
            cargo publish -p micronet-antenna && exit 0
            echo "publish failed (attempt $i), waiting for crates.io index..."
            sleep 20
          done
          exit 1
